name: "Setup Foundry Environment"
description: "Init nested submodules and install Foundry"

runs:
  using: "composite"
  steps:
    - name: Install Foundry v1.7.1
      shell: bash
      env:
        FOUNDRY_VERSION: v1.7.1
        FOUNDRY_ARCHIVE: foundry_v1.7.1_linux_amd64.tar.gz
        FOUNDRY_SHA256: cf7e688ed0c4c48adffca788b496076e31060b67ac5afe1e43dbb5499c20c88b
      run: |
        if [ "$(uname -s)" != "Linux" ] || [ "$(uname -m)" != "x86_64" ]; then
          echo "::error::Pinned Foundry install currently supports Linux x86_64 runners only"
          exit 1
        fi

        ARCHIVE_URL="https://github.com/foundry-rs/foundry/releases/download/${FOUNDRY_VERSION}/${FOUNDRY_ARCHIVE}"
        ARCHIVE_PATH="$RUNNER_TEMP/${FOUNDRY_ARCHIVE}"

        curl --proto '=https' --tlsv1.2 -LsSf \
          --retry 5 \
          --retry-all-errors \
          --retry-delay 2 \
          --retry-max-time 90 \
          "$ARCHIVE_URL" \
          -o "$ARCHIVE_PATH"
        echo "${FOUNDRY_SHA256}  ${ARCHIVE_PATH}" | sha256sum -c -

        mkdir -p "$HOME/.foundry/bin"
        tar -xzf "$ARCHIVE_PATH" -C "$HOME/.foundry/bin"
        chmod +x "$HOME/.foundry/bin/forge" "$HOME/.foundry/bin/cast" "$HOME/.foundry/bin/chisel"
        echo "$HOME/.foundry/bin" >> "$GITHUB_PATH"
    - name: Verify Foundry version
      shell: bash
      run: forge --version
