name: Publish Tokenless npm Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run without uploading packages
        required: true
        default: true
        type: boolean
      npm_tag:
        description: npm dist-tag
        required: true
        default: latest
        type: choice
        options: [latest, next, canary]

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-tokenless-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-production
    env:
      NPM_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.npm_tag || 'latest' }}
      PUBLISH_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: yarn
          registry-url: https://registry.npmjs.org
      - name: Validate publish context
        shell: bash
        run: |
          release_tag=""
          if [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
            release_tag="$GITHUB_REF_NAME"
          fi
          node scripts/validate-npm-release.mjs "$release_tag"

          if [[ "$PUBLISH_DRY_RUN" != "true" && "$GITHUB_REF" != "refs/heads/main" && "$GITHUB_EVENT_NAME" != "release" ]]; then
            echo "Real npm publishes must run from main or a versioned release."
            exit 1
          fi
      - name: Install dependencies
        run: yarn install --immutable
      - name: Validate release metadata
        run: node scripts/run-node-tests.mjs scripts/release-package-metadata.test.mjs
      - name: Build public packages
        run: yarn build:packages
      - name: Test public packages
        run: |
          yarn contracts:test
          yarn node-utils:test
          yarn sdk:test
          yarn agents:test
      - name: Pack public packages
        run: |
          mkdir -p "$RUNNER_TEMP/rateloop-npm"
          yarn workspace @rateloop/contracts pack --out "$RUNNER_TEMP/rateloop-npm/contracts.tgz"
          yarn workspace @rateloop/node-utils pack --out "$RUNNER_TEMP/rateloop-npm/node-utils.tgz"
          yarn workspace @rateloop/sdk pack --out "$RUNNER_TEMP/rateloop-npm/sdk.tgz"
          yarn workspace @rateloop/agents pack --out "$RUNNER_TEMP/rateloop-npm/agents.tgz"
      - name: Publish public packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        shell: bash
        run: |
          if [[ "$PUBLISH_DRY_RUN" != "true" && -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "NPM_TOKEN is required for a real npm publish."
            exit 1
          fi

          publish_args=(--provenance --access public --tag "$NPM_TAG")
          if [[ "$PUBLISH_DRY_RUN" == "true" ]]; then
            publish_args+=(--dry-run)
          fi

          publish_if_missing() {
            local package_name="$1"
            local version="$2"
            local tarball="$3"
            if [[ "$PUBLISH_DRY_RUN" != "true" ]] &&
              [[ "$(npm view "$package_name@$version" version 2>/dev/null || true)" == "$version" ]]; then
              echo "Skipping $package_name@$version; it is already published."
              return
            fi
            npm publish "$tarball" "${publish_args[@]}"
          }

          publish_if_missing "@rateloop/contracts" "$(node -p 'require("./packages/contracts/package.json").version')" "$RUNNER_TEMP/rateloop-npm/contracts.tgz"
          publish_if_missing "@rateloop/node-utils" "$(node -p 'require("./packages/node-utils/package.json").version')" "$RUNNER_TEMP/rateloop-npm/node-utils.tgz"
          publish_if_missing "@rateloop/sdk" "$(node -p 'require("./packages/sdk/package.json").version')" "$RUNNER_TEMP/rateloop-npm/sdk.tgz"
          publish_if_missing "@rateloop/agents" "$(node -p 'require("./packages/agents/package.json").version')" "$RUNNER_TEMP/rateloop-npm/agents.tgz"
