name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: ["24"]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - uses: ./.github/actions/setup-foundry

      - name: Setup node env
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable
      
      - name: Run foundry node, deploy contracts (& generate contracts typescript output)
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          LOCALHOST_KEYSTORE_ACCOUNT: scaffold-eth-default
        run: |
          yarn chain &
          sleep 5
          yarn deploy

      - name: Run nextjs lint
        run: yarn next:lint --max-warnings=0

      - name: Check typings on nextjs
        env:
          CURYO_E2E_PRODUCTION_BUILD: "true"
          NEXT_PUBLIC_CURYO_E2E_PRODUCTION_BUILD: "true"
          NEXT_PUBLIC_TARGET_NETWORKS: "31337"
        run: yarn next:check-types

      - name: Verify production Next.js build
        env:
          CURYO_E2E_PRODUCTION_BUILD: "true"
          NEXT_PUBLIC_CURYO_E2E_PRODUCTION_BUILD: "true"
          DATABASE_URL: "memory:"
          NEXT_PUBLIC_PONDER_URL: https://ponder.example.com
          NEXT_PUBLIC_TARGET_NETWORKS: "31337"
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: 3a8170812b534d0ff9d794f19a901d64
        run: yarn next:build
