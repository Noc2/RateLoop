name: Tokenless Static Analysis

on:
  push:
    branches: [main, tokenless]
  pull_request:
    branches: [main, tokenless]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: yarn
      - run: yarn install --immutable
      - run: yarn security:audit

  keeper-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build tokenless keeper image
        run: docker build -f packages/keeper/Dockerfile -t rateloop-tokenless-keeper:test .

  ponder-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build tokenless indexer image
        run: docker build -f packages/ponder/Dockerfile -t rateloop-tokenless-ponder:test .

  slither:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
      - uses: ./.github/actions/setup-foundry
      - name: Build tokenless contracts
        working-directory: packages/foundry
        run: forge build --skip script --skip test
      - name: Run Slither
        uses: crytic/slither-action@b52cc1cbfee9ca3e8722dd5224299d16c9a6b80f # v0.4.2
        id: slither
        with:
          target: packages/foundry
          sarif: results.sarif
          fail-on: high
          ignore-compile: true
      - name: Upload Slither SARIF
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        if: ${{ always() && hashFiles('results.sarif') != '' }}
        with:
          sarif_file: results.sarif
          category: slither
