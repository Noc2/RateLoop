name: Unit Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
      - uses: ./.github/actions/setup-foundry
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            packages/foundry/cache
            packages/foundry/out
          key: forge-${{ hashFiles('packages/foundry/foundry.toml', 'packages/foundry/**/*.sol') }}
      - name: Enforce EIP-170 contract size limit
        working-directory: packages/foundry
        run: make check-contract-sizes DEPLOY_PROFILE=deploy

  foundry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
      - uses: ./.github/actions/setup-foundry
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            packages/foundry/cache
            packages/foundry/out
          key: forge-${{ hashFiles('packages/foundry/foundry.toml', 'packages/foundry/**/*.sol') }}
      - name: Run Foundry tests
        run: |
          forge test -vvv \
            --skip AdversarialTests.t.sol \
            --skip AuditGapTests.t.sol \
            --skip FormalVerification_GameTheory.t.sol \
            --skip GameTheoryImprovements.t.sol \
            --skip GasBudget.t.sol \
            --skip GasEstimatesReport.t.sol \
            --skip QuestionRewardPoolEscrow.t.sol \
            --skip RoundIntegration.t.sol \
            --skip SettlementEdgeCases.t.sol
        working-directory: packages/foundry

  foundry-heavy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - AdversarialTests.t.sol
          - AuditGapTests.t.sol
          - FormalVerification_GameTheory.t.sol
          - GameTheoryImprovements.t.sol
          - GasBudget.t.sol
          - GasEstimatesReport.t.sol
          - QuestionRewardPoolEscrow.t.sol
          - RoundIntegration.t.sol
          - SettlementEdgeCases.t.sol
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
      - uses: ./.github/actions/setup-foundry
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            packages/foundry/cache
            packages/foundry/out
          key: forge-${{ hashFiles('packages/foundry/foundry.toml', 'packages/foundry/**/*.sol') }}
      - name: Run heavy Foundry suite
        run: forge test -vvv --match-path "test/${{ matrix.suite }}"
        working-directory: packages/foundry

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: yarn
      - run: yarn install --immutable
      - run: yarn test:ts
