name: Tokenless Tests

on:
  push:
    branches: [main, tokenless]
  pull_request:
    branches: [main, tokenless]

permissions:
  contents: read

jobs:
  foundry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: yarn
      - uses: ./.github/actions/setup-foundry
      - name: Install dependencies
        run: yarn install --immutable
      - name: Warm the Solidity compiler cache
        working-directory: packages/foundry
        run: forge build --skip script --skip test
      - name: Build tokenless contracts
        run: yarn foundry:build
      - name: Run tokenless contract tests
        run: yarn foundry:test
      - name: Test deployment artifact tooling
        run: yarn foundry:test:tooling
      - name: Enforce deployable contract sizes
        run: yarn foundry:check:sizes

  packages:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: contracts
            command: yarn contracts:check-types && yarn contracts:test
          - package: node-utils
            command: yarn node-utils:check-types && yarn node-utils:test
          - package: sdk
            command: yarn sdk:check-types && yarn sdk:test
          - package: agents
            command: yarn agents:check-types && yarn agents:test
          - package: keeper
            command: yarn keeper:check-types && yarn keeper:test
          - package: ponder
            command: yarn ponder:check-types && yarn ponder:test
    name: Package (${{ matrix.package }})
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: yarn
      - name: Install dependencies
        run: yarn install --immutable
      - name: Check and test package
        run: ${{ matrix.command }}

  root-tooling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: yarn
      - name: Install dependencies
        run: yarn install --immutable
      - name: Run root and deployment-tool tests
        run: yarn test:node

  app:
    runs-on: ubuntu-latest
    env:
      APP_URL: http://localhost:3000
      DATABASE_URL: "memory:"
      TOKENLESS_SANDBOX_MODE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: yarn
      - name: Install dependencies
        run: yarn install --immutable
      - name: Test app
        run: yarn next:test
      - name: Check app types
        run: yarn next:check-types
      - name: Build isolated tokenless app
        run: yarn next:build
