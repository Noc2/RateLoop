name: Unit Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  contract-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: yarn
      - run: yarn install --immutable
      - uses: ./.github/actions/setup-foundry
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            packages/foundry/cache
            packages/foundry/out
          key: forge-${{ hashFiles('packages/foundry/foundry.toml', 'packages/foundry/**/*.sol') }}
      - name: Enforce EIP-170 contract size limit
        working-directory: packages/foundry
        run: make check-contract-sizes DEPLOY_PROFILE=deploy
      - name: Enforce storage layout pinning
        working-directory: packages/foundry
        run: make check-storage-layouts
      - name: Verify shared ABIs match compiled Solidity
        working-directory: packages/foundry
        run: |
          make generate-abis-only
          git diff --exit-code ../contracts/src/abis ../contracts/src/deployedContracts.ts
      - name: Run generateTsAbis parity tests
        run: yarn foundry:generate-ts-abis:test

  foundry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
      - uses: ./.github/actions/setup-foundry
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            packages/foundry/cache
            packages/foundry/out
          key: forge-${{ hashFiles('packages/foundry/foundry.toml', 'packages/foundry/**/*.sol') }}
      - name: Warm Foundry solc cache
        run: |
          forge build --skip script --skip test --no-cache \
            --out "$RUNNER_TEMP/forge-solc-warmup-out" \
            --cache-path "$RUNNER_TEMP/forge-solc-warmup-cache"
        working-directory: packages/foundry
      - name: Run Foundry tests
        run: |
          for suite in test/*.t.sol; do
            case "$(basename "$suite")" in
              AdversarialTests.t.sol|AuditGapTests.t.sol|FormalVerification_GameTheory.t.sol|GameTheoryImprovements.t.sol|GasBudget.t.sol|GasEstimatesReport.t.sol|QuestionRewardPoolEscrow.t.sol|RoundIntegration.t.sol|SettlementEdgeCases.t.sol)
                continue
                ;;
            esac

            if [ "$(basename "$suite")" = "FormalVerification_RoundLifecycle.t.sol" ]; then
              forge test --offline -vvv --no-cache --match-path "$suite"
            else
              forge test --offline -vvv --match-path "$suite"
            fi
          done
        working-directory: packages/foundry

  foundry-heavy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - AdversarialTests.t.sol
          - AuditGapTests.t.sol
          - FormalVerification_GameTheory.t.sol
          - GameTheoryImprovements.t.sol
          - GasBudget.t.sol
          - GasEstimatesReport.t.sol
          - QuestionRewardPoolEscrow.t.sol
          - RoundIntegration.t.sol
          - SettlementEdgeCases.t.sol
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
      - uses: ./.github/actions/setup-foundry
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            packages/foundry/cache
            packages/foundry/out
          key: forge-${{ hashFiles('packages/foundry/foundry.toml', 'packages/foundry/**/*.sol') }}
      - name: Warm Foundry solc cache
        run: |
          forge build --skip script --skip test --no-cache \
            --out "$RUNNER_TEMP/forge-solc-warmup-out" \
            --cache-path "$RUNNER_TEMP/forge-solc-warmup-cache"
        working-directory: packages/foundry
      - name: Run heavy Foundry suite
        run: forge test --offline -vvv --match-path "test/${{ matrix.suite }}"
        working-directory: packages/foundry

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: yarn
      - run: yarn install --immutable
      - run: yarn test:ts
