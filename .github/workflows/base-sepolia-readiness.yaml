name: Base Sepolia Readiness

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "45 6 * * 1"
  workflow_dispatch:
    inputs:
      live:
        description: Run live RPC, Ponder, and app probes when environment variables are configured
        required: false
        default: "false"
      strict_one_shot_feedback_bonus_x402:
        description: Historical compatibility input; stale one-shot Feedback Bonus x402 readiness now fails by default
        required: false
        default: "true"

permissions:
  contents: read

jobs:
  readiness:
    name: Offline readiness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BASE_SEPOLIA_APP_URL: ${{ vars.BASE_SEPOLIA_APP_URL }}
      BASE_SEPOLIA_KEEPER_URL: ${{ vars.BASE_SEPOLIA_KEEPER_URL }}
      BASE_SEPOLIA_NEXT_ENV_FILE: docs/testing/base-sepolia-next-env.fixture
      BASE_SEPOLIA_PONDER_URL: ${{ vars.BASE_SEPOLIA_PONDER_URL }}
      CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
      KEEPER_CORRELATION_SNAPSHOT_PUBLIC_BASE_URL: https://artifacts.rateloop.ai/rateloop
      METRICS_BIND_ADDRESS: ${{ vars.METRICS_BIND_ADDRESS }}
      NODE_ENV: production
      RATE_LIMIT_TRUSTED_IP_HEADERS: ${{ vars.RATE_LIMIT_TRUSTED_IP_HEADERS }}
      KEEPER_ARTIFACT_HTTPS_ALLOWLIST: https://artifacts.rateloop.ai/rateloop
      PAYOUT_ARTIFACT_HTTPS_ALLOWLIST: https://artifacts.rateloop.ai/rateloop

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Setup node env
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Offline core readiness checks
        run: node scripts/check-base-sepolia-readiness.mjs

  live-readiness:
    name: Live readiness
    if: github.ref == 'refs/heads/main' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.live == 'true'))
    needs: readiness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BASE_SEPOLIA_APP_URL: ${{ vars.BASE_SEPOLIA_APP_URL }}
      BASE_SEPOLIA_KEEPER_URL: ${{ vars.BASE_SEPOLIA_KEEPER_URL }}
      BASE_SEPOLIA_NEXT_ENV_FILE: docs/testing/base-sepolia-next-env.fixture
      BASE_SEPOLIA_PONDER_URL: ${{ vars.BASE_SEPOLIA_PONDER_URL }}
      CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
      KEEPER_CORRELATION_SNAPSHOT_PUBLIC_BASE_URL: https://artifacts.rateloop.ai/rateloop
      METRICS_BIND_ADDRESS: ${{ vars.METRICS_BIND_ADDRESS }}
      NODE_ENV: production
      RATE_LIMIT_TRUSTED_IP_HEADERS: ${{ vars.RATE_LIMIT_TRUSTED_IP_HEADERS }}
      KEEPER_ARTIFACT_HTTPS_ALLOWLIST: https://artifacts.rateloop.ai/rateloop
      PAYOUT_ARTIFACT_HTTPS_ALLOWLIST: https://artifacts.rateloop.ai/rateloop

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Setup node env
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Live core readiness probes
        env:
          BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
          KEEPER_DATABASE_URL: ${{ secrets.KEEPER_DATABASE_URL }}
          METRICS_AUTH_TOKEN: ${{ secrets.METRICS_AUTH_TOKEN }}
          PONDER_METADATA_SYNC_TOKEN: ${{ secrets.PONDER_METADATA_SYNC_TOKEN }}
          PONDER_KEEPER_WORK_TOKEN: ${{ secrets.PONDER_KEEPER_WORK_TOKEN }}
        run: |
          args=(--live --require-live-targets)
          node scripts/check-base-sepolia-readiness.mjs "${args[@]}"
