name: Base Mainnet Readiness

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "15 7 * * 1"
  workflow_dispatch:
    inputs:
      live:
        description: Run live RPC, Ponder, and app probes when environment variables are configured
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  readiness:
    name: Offline readiness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BASE_APP_URL: ${{ vars.BASE_APP_URL }}
      BASE_KEEPER_URL: ${{ vars.BASE_KEEPER_URL }}
      BASE_PONDER_URL: ${{ vars.BASE_PONDER_URL }}
      CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
      KEEPER_CORRELATION_SNAPSHOT_PUBLIC_BASE_URL: https://artifacts.rateloop.ai/rateloop
      METRICS_BIND_ADDRESS: ${{ vars.METRICS_BIND_ADDRESS }}
      NODE_ENV: production
      RATE_LIMIT_TRUSTED_IP_HEADERS: ${{ vars.RATE_LIMIT_TRUSTED_IP_HEADERS }}
      KEEPER_ARTIFACT_HTTPS_ALLOWLIST: https://artifacts.rateloop.ai/rateloop
      PAYOUT_ARTIFACT_HTTPS_ALLOWLIST: https://artifacts.rateloop.ai/rateloop

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Setup node env
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Offline production readiness checks
        run: node scripts/check-base-mainnet-readiness.mjs

  live-readiness:
    name: Live readiness
    if: github.ref == 'refs/heads/main' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.live == 'true'))
    needs: readiness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BASE_APP_URL: ${{ vars.BASE_APP_URL }}
      BASE_KEEPER_URL: ${{ vars.BASE_KEEPER_URL }}
      BASE_PONDER_URL: ${{ vars.BASE_PONDER_URL }}
      CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
      KEEPER_CORRELATION_SNAPSHOT_PUBLIC_BASE_URL: https://artifacts.rateloop.ai/rateloop
      METRICS_BIND_ADDRESS: ${{ vars.METRICS_BIND_ADDRESS }}
      NODE_ENV: production
      RATE_LIMIT_TRUSTED_IP_HEADERS: ${{ vars.RATE_LIMIT_TRUSTED_IP_HEADERS }}
      KEEPER_ARTIFACT_HTTPS_ALLOWLIST: https://artifacts.rateloop.ai/rateloop
      PAYOUT_ARTIFACT_HTTPS_ALLOWLIST: https://artifacts.rateloop.ai/rateloop

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Setup node env
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Live readiness probes
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          KEEPER_DATABASE_URL: ${{ secrets.KEEPER_DATABASE_URL }}
          METRICS_AUTH_TOKEN: ${{ secrets.METRICS_AUTH_TOKEN }}
          PONDER_METADATA_SYNC_TOKEN: ${{ secrets.PONDER_METADATA_SYNC_TOKEN }}
          PONDER_KEEPER_WORK_TOKEN: ${{ secrets.PONDER_KEEPER_WORK_TOKEN }}
          RATELOOP_CONFIDENTIALITY_ACCESS_RECORDER_PRIVATE_KEY: ${{ secrets.RATELOOP_CONFIDENTIALITY_ACCESS_RECORDER_PRIVATE_KEY }}
        run: node scripts/check-base-mainnet-readiness.mjs --live --require-live-targets
