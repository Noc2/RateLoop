name: Certora

# Formal verification lane. Runs on demand, on a weekly schedule, and on PRs that touch
# contracts or the Certora workspace. NOT a required PR gate yet (no branch protection):
# it stays informational until prover runtimes and false-positive rates are understood
# across the full matrix (see docs/testing/certora-followup.md "CI maturation").

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  pull_request:
    paths:
      - "packages/foundry/contracts/**"
      - "packages/foundry/certora/**"
      - ".github/workflows/certora.yaml"

permissions:
  contents: read

env:
  # Pinned to the version the specs were authored and verified against. Bump deliberately
  # after re-running the matrix; a floating "latest" can silently break the lane.
  CERTORA_CLI_VERSION: "==8.13.1"
  SOLC_VERSION: "0.8.35"

jobs:
  certora:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        conf:
          - certora/confs/math.conf
          - certora/confs/cluster-payout-oracle.conf
          - certora/confs/round-voting-engine.conf
          - certora/confs/round-reward-distributor.conf
          - certora/confs/no-double-claim.conf
          - certora/confs/round-voting-engine-lifecycle.conf
          - certora/confs/launch-distribution-pool.conf
          - certora/confs/frontend-registry.conf
          - certora/confs/feedback-bonus-escrow.conf
    name: ${{ matrix.conf }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - uses: ./.github/actions/setup-foundry

      - name: Install Java 21
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends openjdk-21-jre-headless
          java --version

      - name: Install Certora CLI and solc
        run: |
          python3 -m pip install --upgrade pip
          if [ -n "$CERTORA_CLI_VERSION" ]; then
            python3 -m pip install "certora-cli${CERTORA_CLI_VERSION}" solc-select
          else
            python3 -m pip install certora-cli solc-select
          fi
          solc-select install "$SOLC_VERSION"
          solc-select use "$SOLC_VERSION"
          certoraRun --version
          solc --version

      - name: Run Certora proofs
        working-directory: packages/foundry
        env:
          CERTORAKEY: ${{ secrets.CERTORAKEY }}
          CONF: ${{ matrix.conf }}
        run: |
          if [ -z "$CERTORAKEY" ]; then
            echo "::warning::CERTORAKEY secret not set; skipping prover run."
            exit 0
          fi
          # --wait_for_results makes the job fail if any rule is violated.
          certoraRun "$CONF" --wait_for_results all
