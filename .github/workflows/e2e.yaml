name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  APP_URL: http://localhost:3000
  # Shared local-only token for production-mode Next.js -> Ponder metadata sync.
  PONDER_METADATA_SYNC_TOKEN: rateloop-e2e-metadata-sync-token

permissions:
  contents: read

jobs:
  e2e:
    name: E2E (${{ matrix.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    services:
      postgres:
        image: postgres:16@sha256:287eced1f33b59ed265ed13a60d3680dd7646d70c4dc0e785f59a470ebc03eeb
        env:
          POSTGRES_DB: rateloop_app
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rateloop_app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: smoke
            command: yarn workspace @rateloop/nextjs e2e:ci:smoke
            playwright_browsers: chromium
            timeout: 30
            start_keeper: false
            warm_routes: true
          - suite: api
            command: yarn workspace @rateloop/nextjs e2e:ci:api
            playwright_browsers: none
            timeout: 30
            start_keeper: false
            warm_routes: false
          - suite: app
            command: yarn workspace @rateloop/nextjs e2e:ci:app
            playwright_browsers: chromium
            timeout: 45
            start_keeper: false
            warm_routes: true
          - suite: submit
            command: yarn workspace @rateloop/nextjs e2e:ci:submit
            playwright_browsers: chromium
            timeout: 35
            start_keeper: false
            warm_routes: true
          - suite: confidential
            command: yarn workspace @rateloop/nextjs e2e:ci:confidential
            playwright_browsers: chromium
            timeout: 45
            start_keeper: false
            warm_routes: true
          - suite: world-id
            command: yarn workspace @rateloop/nextjs e2e:ci:world-id
            playwright_browsers: chromium
            timeout: 30
            start_keeper: false
            warm_routes: false
          - suite: responsive
            command: yarn workspace @rateloop/nextjs e2e:responsive
            playwright_browsers: chromium
            timeout: 35
            start_keeper: false
            warm_routes: true
          - suite: a11y
            command: yarn workspace @rateloop/nextjs e2e:a11y
            playwright_browsers: chromium
            timeout: 30
            start_keeper: false
            warm_routes: true
          - suite: lifecycle
            command: yarn workspace @rateloop/nextjs e2e:ci:lifecycle
            playwright_browsers: chromium
            timeout: 45
            start_keeper: false
            warm_routes: true
          - suite: keeper
            command: yarn workspace @rateloop/nextjs e2e:ci:keeper
            playwright_browsers: chromium
            timeout: 35
            start_keeper: true
            warm_routes: true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
      - uses: ./.github/actions/setup-foundry

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Cache Playwright browsers
        if: matrix.playwright_browsers != 'none'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('yarn.lock', 'packages/nextjs/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Disable optional Microsoft apt sources
        if: matrix.playwright_browsers != 'none'
        run: |
          sudo rm -f \
            /etc/apt/sources.list.d/azure-cli.list \
            /etc/apt/sources.list.d/azure-cli.sources \
            /etc/apt/sources.list.d/microsoft-prod.list \
            /etc/apt/sources.list.d/microsoft-prod.sources

      - name: Install Playwright browsers
        if: matrix.playwright_browsers != 'none'
        run: yarn workspace @rateloop/nextjs exec playwright install ${{ matrix.playwright_browsers }} --with-deps

      - name: Start Anvil and deploy contracts
        env:
          ETHERSCAN_API_KEY: local-anvil-dummy
          LOCALHOST_KEYSTORE_ACCOUNT: scaffold-eth-default
        run: |
          yarn chain &
          timeout 120 bash -c 'until cast block-number --rpc-url http://127.0.0.1:8545 > /dev/null 2>&1; do sleep 2; done'
          echo "✓ Anvil ready"
          yarn deploy

      - name: Build Next.js
        env:
          RATELOOP_E2E_PRODUCTION_BUILD: "true"
          NEXT_PUBLIC_RATELOOP_E2E_PRODUCTION_BUILD: "true"
          DATABASE_URL: "memory:"
          NEXT_PUBLIC_FRONTEND_CODE: "0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC"
          NEXT_PUBLIC_PONDER_URL: http://127.0.0.1:42069
          NEXT_PUBLIC_TARGET_NETWORKS: "31337"
          NEXT_PUBLIC_THIRDWEB_CLIENT_ID: 124332de491a2aa8b7ba8ea6db1ce693
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: 3a8170812b534d0ff9d794f19a901d64
        run: yarn workspace @rateloop/nextjs build

      - name: Start Ponder indexer
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/rateloop_app
          RATELOOP_PONDER_DATABASE_SCHEMA: rateloop_ponder_ci
          PONDER_NETWORK: hardhat
          PONDER_RPC_URL_31337: http://127.0.0.1:8545
          CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
          RATE_LIMIT_TRUSTED_IP_HEADERS: x-forwarded-for
        run: yarn workspace @rateloop/ponder start:built-contracts --port 42069 &

      - name: Start Next.js (production)
        env:
          RATELOOP_E2E_PRODUCTION_BUILD: "true"
          NEXT_PUBLIC_RATELOOP_E2E_PRODUCTION_BUILD: "true"
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/rateloop_app
          NEXT_PUBLIC_FRONTEND_CODE: "0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC"
          NEXT_PUBLIC_PONDER_URL: http://127.0.0.1:42069
          NEXT_PUBLIC_TARGET_NETWORKS: "31337"
          NEXT_PUBLIC_THIRDWEB_CLIENT_ID: 124332de491a2aa8b7ba8ea6db1ce693
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: 3a8170812b534d0ff9d794f19a901d64
          RATELOOP_CONFIDENTIALITY_SECRET: rateloop-e2e-confidentiality-secret
          RATELOOP_CONFIDENTIALITY_JOB_SECRET: rateloop-e2e-confidentiality-secret
          CRON_SECRET: rateloop-e2e-confidentiality-secret
          NOTIFICATION_DELIVERY_SECRET: rateloop-e2e-confidentiality-secret
        run: yarn workspace @rateloop/nextjs serve &

      - name: Wait for services
        env:
          E2E_PREFLIGHT_TIMEOUT_MS: "300000"
          NEXT_PUBLIC_PONDER_URL: http://127.0.0.1:42069
        run: yarn workspace @rateloop/nextjs e2e:preflight

      - name: Warm critical Next.js routes
        if: matrix.warm_routes
        run: |
          # Avoid spending Playwright's navigation budget on first-hit Next dev compilation.
          for route in / /rate /ask /vote/reveal /docs /legal /legal/terms; do
            echo "Warming ${route}"
            timeout 120 bash -c "until curl -fsS http://localhost:3000${route} > /dev/null 2>&1; do sleep 2; done"
          done

      - name: Start keeper service
        if: matrix.start_keeper
        env:
          RPC_URL: http://127.0.0.1:8545
          CHAIN_ID: "31337"
          KEEPER_PRIVATE_KEY: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
          PONDER_BASE_URL: http://127.0.0.1:42069
          KEEPER_INTERVAL_MS: "5000"
          KEEPER_WORK_DISCOVERY_CHAIN_SCAN_PER_TICK: "100"
          METRICS_ENABLED: "true"
          METRICS_PORT: "9090"
        run: yarn keeper:start &

      - name: Wait for keeper
        if: matrix.start_keeper
        run: |
          timeout 120 bash -c 'until curl -sf http://127.0.0.1:9090/health > /dev/null 2>&1; do sleep 2; done'
          echo "✓ Keeper ready"

      - name: Run E2E tests
        run: ${{ matrix.command }}
        env:
          CI: true
          RATELOOP_E2E_PRODUCTION_BUILD: "true"
          NEXT_PUBLIC_RATELOOP_E2E_PRODUCTION_BUILD: "true"
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/rateloop_app
          NEXT_PUBLIC_FRONTEND_CODE: "0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC"
          NEXT_PUBLIC_PONDER_URL: http://127.0.0.1:42069
          NEXT_PUBLIC_TARGET_NETWORKS: "31337"
          NEXT_PUBLIC_THIRDWEB_CLIENT_ID: 124332de491a2aa8b7ba8ea6db1ce693
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: 3a8170812b534d0ff9d794f19a901d64
          RATELOOP_CONFIDENTIALITY_SECRET: rateloop-e2e-confidentiality-secret
          RATELOOP_CONFIDENTIALITY_JOB_SECRET: rateloop-e2e-confidentiality-secret
          CRON_SECRET: rateloop-e2e-confidentiality-secret
          NOTIFICATION_DELIVERY_SECRET: rateloop-e2e-confidentiality-secret
          # Anvil/Hardhat account #2 — well-known test key, no real funds
          KEEPER_PRIVATE_KEY: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
          KEEPER_INTERVAL_MS: "5000"

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.suite }}
          path: |
            packages/nextjs/e2e/playwright-report/
            packages/nextjs/e2e/test-results/
          if-no-files-found: ignore
          retention-days: 14

  e2e-browser-compat:
    name: E2E Browser Compat
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble@sha256:6446946a1d9fd62d9ae501312a2d76a43ee688542b21622056a372959b65d63d
      options: --ipc=host
    env:
      HOME: /root
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    services:
      postgres:
        image: postgres:16@sha256:287eced1f33b59ed265ed13a60d3680dd7646d70c4dc0e785f59a470ebc03eeb
        env:
          POSTGRES_DB: rateloop_app
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rateloop_app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: browser-compat
            command: yarn workspace @rateloop/nextjs e2e:compat
            playwright_browsers: chromium firefox webkit
            timeout: 45
            warm_routes: true
          - suite: mobile-phone-navigation
            command: yarn workspace @rateloop/nextjs e2e:mobile:phone:navigation
            playwright_browsers: webkit
            timeout: 35
            warm_routes: true
          - suite: mobile-phone-vote
            command: yarn workspace @rateloop/nextjs e2e:mobile:phone:vote
            playwright_browsers: webkit
            timeout: 45
            warm_routes: true
          - suite: mobile-phone-pages
            command: yarn workspace @rateloop/nextjs e2e:mobile:phone:pages
            playwright_browsers: webkit
            timeout: 35
            warm_routes: true
          - suite: mobile-android
            command: yarn workspace @rateloop/nextjs e2e:mobile:android
            playwright_browsers: chromium
            timeout: 45
            warm_routes: true
          - suite: mobile-tablet
            command: yarn workspace @rateloop/nextjs e2e:mobile:tablet
            playwright_browsers: webkit
            timeout: 45
            warm_routes: true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
      - uses: ./.github/actions/setup-foundry

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install contract build tools
        run: |
          if ! command -v make >/dev/null 2>&1 || ! command -v jq >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends jq make
          fi

      - name: Start Anvil and deploy contracts
        env:
          ETHERSCAN_API_KEY: local-anvil-dummy
          LOCALHOST_KEYSTORE_ACCOUNT: scaffold-eth-default
        run: |
          yarn chain &
          timeout 120 bash -c 'until cast block-number --rpc-url http://127.0.0.1:8545 > /dev/null 2>&1; do sleep 2; done'
          echo "✓ Anvil ready"
          yarn deploy

      - name: Build Next.js
        env:
          RATELOOP_E2E_PRODUCTION_BUILD: "true"
          NEXT_PUBLIC_RATELOOP_E2E_PRODUCTION_BUILD: "true"
          DATABASE_URL: "memory:"
          NEXT_PUBLIC_PONDER_URL: http://127.0.0.1:42069
          NEXT_PUBLIC_TARGET_NETWORKS: "31337"
          NEXT_PUBLIC_THIRDWEB_CLIENT_ID: 124332de491a2aa8b7ba8ea6db1ce693
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: 3a8170812b534d0ff9d794f19a901d64
        run: yarn workspace @rateloop/nextjs build

      - name: Start Ponder indexer
        env:
          DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rateloop_app
          RATELOOP_PONDER_DATABASE_SCHEMA: rateloop_ponder_ci
          PONDER_NETWORK: hardhat
          PONDER_RPC_URL_31337: http://127.0.0.1:8545
          CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
          RATE_LIMIT_TRUSTED_IP_HEADERS: x-forwarded-for
        run: yarn workspace @rateloop/ponder start:built-contracts --port 42069 &

      - name: Start Next.js (production)
        env:
          RATELOOP_E2E_PRODUCTION_BUILD: "true"
          NEXT_PUBLIC_RATELOOP_E2E_PRODUCTION_BUILD: "true"
          DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rateloop_app
          NEXT_PUBLIC_PONDER_URL: http://127.0.0.1:42069
          NEXT_PUBLIC_TARGET_NETWORKS: "31337"
          NEXT_PUBLIC_THIRDWEB_CLIENT_ID: 124332de491a2aa8b7ba8ea6db1ce693
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: 3a8170812b534d0ff9d794f19a901d64
          RATELOOP_CONFIDENTIALITY_SECRET: rateloop-e2e-confidentiality-secret
          RATELOOP_CONFIDENTIALITY_JOB_SECRET: rateloop-e2e-confidentiality-secret
          CRON_SECRET: rateloop-e2e-confidentiality-secret
          NOTIFICATION_DELIVERY_SECRET: rateloop-e2e-confidentiality-secret
        run: yarn workspace @rateloop/nextjs serve &

      - name: Wait for services
        env:
          E2E_PREFLIGHT_TIMEOUT_MS: "300000"
          NEXT_PUBLIC_PONDER_URL: http://127.0.0.1:42069
        run: yarn workspace @rateloop/nextjs e2e:preflight

      - name: Warm critical Next.js routes
        if: matrix.warm_routes
        run: |
          for route in / /rate /ask /docs /legal /legal/terms; do
            echo "Warming ${route}"
            timeout 120 bash -c "until curl -fsS http://localhost:3000${route} > /dev/null 2>&1; do sleep 2; done"
          done

      - name: Run browser compatibility tests
        run: ${{ matrix.command }}
        env:
          CI: true
          RATELOOP_E2E_PRODUCTION_BUILD: "true"
          NEXT_PUBLIC_RATELOOP_E2E_PRODUCTION_BUILD: "true"
          DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rateloop_app
          NEXT_PUBLIC_PONDER_URL: http://127.0.0.1:42069
          NEXT_PUBLIC_TARGET_NETWORKS: "31337"
          NEXT_PUBLIC_THIRDWEB_CLIENT_ID: 124332de491a2aa8b7ba8ea6db1ce693
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: 3a8170812b534d0ff9d794f19a901d64
          RATELOOP_CONFIDENTIALITY_SECRET: rateloop-e2e-confidentiality-secret
          RATELOOP_CONFIDENTIALITY_JOB_SECRET: rateloop-e2e-confidentiality-secret
          CRON_SECRET: rateloop-e2e-confidentiality-secret
          NOTIFICATION_DELIVERY_SECRET: rateloop-e2e-confidentiality-secret
          # Anvil/Hardhat account #2 — well-known test key, no real funds
          KEEPER_PRIVATE_KEY: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-report-browser-compat-${{ matrix.suite }}
          path: |
            packages/nextjs/e2e/playwright-report/
            packages/nextjs/e2e/test-results/
          if-no-files-found: ignore
          retention-days: 14
