name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  e2e:
    name: E2E (${{ matrix.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: curyo_app
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d curyo_app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: smoke
            command: yarn workspace @curyo/nextjs e2e:ci:smoke
            playwright_browsers: chromium
            timeout: 30
            start_keeper: false
          - suite: responsive
            command: yarn workspace @curyo/nextjs e2e:responsive
            playwright_browsers: chromium
            timeout: 35
            start_keeper: false
          - suite: a11y
            command: yarn workspace @curyo/nextjs e2e:a11y
            playwright_browsers: chromium
            timeout: 30
            start_keeper: false
          - suite: lifecycle
            command: yarn workspace @curyo/nextjs e2e:ci:lifecycle
            playwright_browsers: chromium
            timeout: 45
            start_keeper: false
          - suite: keeper
            command: yarn workspace @curyo/nextjs e2e:ci:keeper
            playwright_browsers: chromium
            timeout: 35
            start_keeper: true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
      - uses: ./.github/actions/setup-foundry

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Playwright browsers
        run: yarn workspace @curyo/nextjs exec playwright install ${{ matrix.playwright_browsers }} --with-deps

      - name: Start Anvil and deploy contracts
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          LOCALHOST_KEYSTORE_ACCOUNT: scaffold-eth-default
        run: |
          yarn chain &
          sleep 5
          yarn deploy

      - name: Start Ponder indexer
        env:
          PONDER_NETWORK: hardhat
          PONDER_RPC_URL_31337: http://127.0.0.1:8545
        run: yarn ponder:dev &

      - name: Build Next.js
        env:
          CURYO_E2E_PRODUCTION_BUILD: "true"
          NEXT_PUBLIC_CURYO_E2E_PRODUCTION_BUILD: "true"
          DATABASE_URL: "memory:"
          NEXT_PUBLIC_PONDER_URL: http://127.0.0.1:42069
          NEXT_PUBLIC_TARGET_NETWORKS: "31337"
          NEXT_PUBLIC_THIRDWEB_CLIENT_ID: 124332de491a2aa8b7ba8ea6db1ce693
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: 3a8170812b534d0ff9d794f19a901d64
        run: yarn workspace @curyo/nextjs build

      - name: Start Next.js (production)
        env:
          CURYO_E2E_PRODUCTION_BUILD: "true"
          NEXT_PUBLIC_CURYO_E2E_PRODUCTION_BUILD: "true"
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/curyo_app
          NEXT_PUBLIC_PONDER_URL: http://127.0.0.1:42069
          NEXT_PUBLIC_TARGET_NETWORKS: "31337"
          NEXT_PUBLIC_THIRDWEB_CLIENT_ID: 124332de491a2aa8b7ba8ea6db1ce693
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: 3a8170812b534d0ff9d794f19a901d64
        run: yarn workspace @curyo/nextjs serve &

      - name: Wait for services
        run: |
          # Wait for Next.js
          timeout 120 bash -c 'until curl -s http://localhost:3000 > /dev/null 2>&1; do sleep 2; done'
          echo "✓ Next.js ready"

          # Wait for Ponder
          timeout 120 bash -c 'until curl -sf http://127.0.0.1:42069/status > /dev/null 2>&1; do sleep 2; done'
          echo "✓ Ponder ready"

      - name: Warm critical Next.js routes
        run: |
          # Avoid spending Playwright's navigation budget on first-hit Next dev compilation.
          for route in / /rate /ask /vote/reveal /docs /legal /legal/terms; do
            echo "Warming ${route}"
            timeout 120 bash -c "until curl -fsS http://localhost:3000${route} > /dev/null 2>&1; do sleep 2; done"
          done

      - name: Start keeper service
        if: matrix.start_keeper
        env:
          RPC_URL: http://127.0.0.1:8545
          CHAIN_ID: "31337"
          KEEPER_PRIVATE_KEY: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
          METRICS_ENABLED: "true"
          METRICS_PORT: "9090"
        run: yarn keeper:start &

      - name: Wait for keeper
        if: matrix.start_keeper
        run: |
          timeout 120 bash -c 'until curl -sf http://127.0.0.1:9090/health > /dev/null 2>&1; do sleep 2; done'
          echo "✓ Keeper ready"

      - name: Run E2E tests
        run: ${{ matrix.command }}
        env:
          CI: true
          CURYO_E2E_PRODUCTION_BUILD: "true"
          NEXT_PUBLIC_CURYO_E2E_PRODUCTION_BUILD: "true"
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/curyo_app
          NEXT_PUBLIC_PONDER_URL: http://127.0.0.1:42069
          NEXT_PUBLIC_TARGET_NETWORKS: "31337"
          NEXT_PUBLIC_THIRDWEB_CLIENT_ID: 124332de491a2aa8b7ba8ea6db1ce693
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: 3a8170812b534d0ff9d794f19a901d64
          # Anvil/Hardhat account #2 — well-known test key, no real funds
          KEEPER_PRIVATE_KEY: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.suite }}
          path: packages/nextjs/e2e/playwright-report/
          if-no-files-found: ignore
          retention-days: 14

  e2e-browser-compat:
    name: E2E Browser Compat
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: curyo_app
