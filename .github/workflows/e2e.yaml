            timeout: 45
          - suite: mobile
            command: yarn workspace @curyo/nextjs e2e:mobile
            playwright_browsers: chromium webkit
            timeout: 45

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
      - uses: ./.github/actions/setup-foundry

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Playwright browsers
        run: yarn workspace @curyo/nextjs exec playwright install ${{ matrix.playwright_browsers }} --with-deps

      - name: Start Anvil and deploy contracts
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
