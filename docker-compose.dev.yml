services:
  next-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${CURYO_LOCAL_DB_NAME:-curyo_app}
      POSTGRES_USER: ${CURYO_LOCAL_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${CURYO_LOCAL_DB_PASSWORD:-postgres}
    ports:
      - "${CURYO_LOCAL_DB_PORT:-5432}:5432"
    volumes:
      - curyo-next-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 20

volumes:
  curyo-next-postgres:
