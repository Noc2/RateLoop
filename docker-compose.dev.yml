services:
  next-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${RATELOOP_LOCAL_DB_NAME:-rateloop_app}
      POSTGRES_USER: ${RATELOOP_LOCAL_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${RATELOOP_LOCAL_DB_PASSWORD:-postgres}
    ports:
      - "${RATELOOP_LOCAL_DB_HOST:-127.0.0.1}:${RATELOOP_LOCAL_DB_PORT:-5432}:5432"
    volumes:
      - rateloop-next-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 20

volumes:
  rateloop-next-postgres:
