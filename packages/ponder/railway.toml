[build]
builder = "DOCKERFILE"
dockerfilePath = "packages/ponder/Dockerfile"
watchPatterns = [
  ".yarn/**",
  ".yarnrc.yml",
  "package.json",
  "yarn.lock",
  "packages/ponder/**",
]

[deploy]
startCommand = "yarn start"
healthcheckPath = "/health/tokenless"
healthcheckTimeout = 120

[deploy.multiRegionConfig]
"europe-west4-drams3a" = { numReplicas = 1 }
