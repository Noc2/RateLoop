<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" role="img" aria-labelledby="title desc">
  <title id="title">RateLoop X profile banner</title>
  <desc id="desc">A text-free X banner using a reduced crop of the RateLoop README hero animation image.</desc>
  <rect width="1500" height="500" fill="#000000" />
  <defs>
    <clipPath id="hero-orb-crop">
      <rect x="910" y="10" width="441.905" height="480" />
    </clipPath>
  </defs>
  <image
    href="../og-image.jpg"
    x="437.619"
    y="10"
    width="914.286"
    height="480"
    preserveAspectRatio="none"
    clip-path="url(#hero-orb-crop)"
  />
</svg>
