<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" role="img" aria-labelledby="title desc">
  <title id="title">RateLoop X profile banner</title>
  <desc id="desc">A dark X banner using a still frame from the RateLoop homepage hero animation, without the RateLoop logo.</desc>
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#000000" />
      <stop offset="50%" stop-color="#080808" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
    <radialGradient id="hero-blue-glow" cx="78%" cy="48%" r="42%">
      <stop offset="0%" stop-color="#359EEE" stop-opacity="0.20" />
      <stop offset="56%" stop-color="#359EEE" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#359EEE" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="hero-warm-glow" cx="72%" cy="36%" r="40%">
      <stop offset="0%" stop-color="#FFC43D" stop-opacity="0.15" />
      <stop offset="62%" stop-color="#FFC43D" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#FFC43D" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="hero-pink-glow" cx="87%" cy="64%" r="38%">
      <stop offset="0%" stop-color="#EF476F" stop-opacity="0.17" />
      <stop offset="62%" stop-color="#EF476F" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#EF476F" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="agent-gradient" x1="70" y1="0" x2="520" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#359EEE" />
      <stop offset="28%" stop-color="#03CEA4" />
      <stop offset="58%" stop-color="#FFC43D" />
      <stop offset="100%" stop-color="#EF476F" />
    </linearGradient>
    <linearGradient id="copy-rule" x1="70" y1="0" x2="530" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#359EEE" />
      <stop offset="34%" stop-color="#03CEA4" />
      <stop offset="68%" stop-color="#FFC43D" />
      <stop offset="100%" stop-color="#EF476F" />
    </linearGradient>
    <pattern id="dot-field" width="46" height="46" patternUnits="userSpaceOnUse">
      <circle cx="23" cy="23" r="1.05" fill="#F5F5F5" opacity="0.12" />
    </pattern>
    <filter id="hero-orb-glow" x="-28%" y="-34%" width="156%" height="168%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-copy-shadow" x="-8%" y="-12%" width="116%" height="124%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.78" />
    </filter>
  </defs>

  <rect width="1500" height="500" fill="url(#surface)" />
  <rect width="1500" height="500" fill="url(#hero-blue-glow)" />
  <rect width="1500" height="500" fill="url(#hero-warm-glow)" />
  <rect width="1500" height="500" fill="url(#hero-pink-glow)" />
  <rect width="1500" height="500" fill="url(#dot-field)" opacity="0.22" />

  <g opacity="0.18" stroke="#F5F5F5" stroke-width="1">
    <path d="M0 72H1500" />
    <path d="M0 428H1500" />
    <path d="M104 0V500" />
    <path d="M612 0V500" />
    <path d="M1118 0V500" />
  </g>

  <g transform="translate(360 -390) scale(2.1)" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#hero-orb-glow)">
    <ellipse cx="400" cy="300" rx="111.3" ry="107.8" transform="rotate(-170.2 400 300)" stroke="#49A2DC" stroke-width="1.8" opacity="0.92" />
    <ellipse cx="400" cy="300" rx="112.8" ry="105.5" transform="rotate(-184.4 400 300)" stroke="#5DA6CB" stroke-width="1.8" opacity="0.89" />
    <ellipse cx="400" cy="300" rx="114.2" ry="103.1" transform="rotate(-194.4 400 300)" stroke="#72A9B9" stroke-width="1.8" opacity="0.86" />
    <ellipse cx="400" cy="300" rx="115.6" ry="100.9" transform="rotate(-200.3 400 300)" stroke="#86ADA7" stroke-width="1.8" opacity="0.84" />
    <ellipse cx="400" cy="300" rx="116.7" ry="98.9" transform="rotate(-202.0 400 300)" stroke="#9AB196" stroke-width="1.55" opacity="0.81" />
    <ellipse cx="400" cy="300" rx="117.6" ry="97.5" transform="rotate(-199.9 400 300)" stroke="#AEB584" stroke-width="1.55" opacity="0.78" />
    <ellipse cx="400" cy="300" rx="118.2" ry="96.5" transform="rotate(-194.3 400 300)" stroke="#C2B972" stroke-width="1.55" opacity="0.75" />
    <ellipse cx="400" cy="300" rx="118.4" ry="96.2" transform="rotate(-185.9 400 300)" stroke="#D7BC60" stroke-width="1.55" opacity="0.73" />
    <ellipse cx="400" cy="300" rx="118.2" ry="96.5" transform="rotate(-175.3 400 300)" stroke="#EBC04F" stroke-width="1.55" opacity="0.70" />
    <ellipse cx="400" cy="300" rx="117.6" ry="97.4" transform="rotate(-163.5 400 300)" stroke="#FFC43D" stroke-width="1.55" opacity="0.67" />
    <ellipse cx="400" cy="300" rx="116.7" ry="98.9" transform="rotate(-151.3 400 300)" stroke="#FDB842" stroke-width="1.55" opacity="0.64" />
    <ellipse cx="400" cy="300" rx="115.6" ry="100.8" transform="rotate(-139.6 400 300)" stroke="#FCAB47" stroke-width="1.55" opacity="0.61" />
    <ellipse cx="400" cy="300" rx="114.3" ry="103.0" transform="rotate(-129.3 400 300)" stroke="#FA9F4C" stroke-width="1.35" opacity="0.59" />
    <ellipse cx="400" cy="300" rx="112.9" ry="105.2" transform="rotate(-121.3 400 300)" stroke="#F99251" stroke-width="1.35" opacity="0.56" />
    <ellipse cx="400" cy="300" rx="111.7" ry="107.2" transform="rotate(-116.2 400 300)" stroke="#F78656" stroke-width="1.35" opacity="0.53" />
    <ellipse cx="400" cy="300" rx="110.7" ry="108.8" transform="rotate(-114.6 400 300)" stroke="#F5795B" stroke-width="1.35" opacity="0.50" />
    <ellipse cx="400" cy="300" rx="110.1" ry="109.8" transform="rotate(-117.0 400 300)" stroke="#F46D60" stroke-width="1.35" opacity="0.48" />
    <ellipse cx="400" cy="300" rx="110.0" ry="109.9" transform="rotate(-123.5 400 300)" stroke="#F26065" stroke-width="1.35" opacity="0.45" />
    <ellipse cx="400" cy="300" rx="110.5" ry="109.1" transform="rotate(-134.2 400 300)" stroke="#F1546A" stroke-width="1.35" opacity="0.42" />
    <ellipse cx="400" cy="300" rx="111.7" ry="107.1" transform="rotate(-148.9 400 300)" stroke="#EF476F" stroke-width="1.35" opacity="0.39" />
    <ellipse cx="400" cy="300" rx="113.7" ry="104.0" transform="rotate(-167.4 400 300)" stroke="#D75474" stroke-width="1.35" opacity="0.36" />
    <ellipse cx="400" cy="300" rx="116.3" ry="99.7" transform="rotate(-189.0 400 300)" stroke="#C0627A" stroke-width="1.35" opacity="0.34" />
    <ellipse cx="400" cy="300" rx="119.6" ry="94.3" transform="rotate(-213.1 400 300)" stroke="#A8707F" stroke-width="1.35" opacity="0.31" />
    <ellipse cx="400" cy="300" rx="123.5" ry="87.9" transform="rotate(-238.9 400 300)" stroke="#917D84" stroke-width="1.35" opacity="0.28" />
    <ellipse cx="400" cy="300" rx="127.8" ry="80.8" transform="rotate(-265.5 400 300)" stroke="#798B8A" stroke-width="1.35" opacity="0.25" />
    <ellipse cx="400" cy="300" rx="132.4" ry="73.2" transform="rotate(-292.1 400 300)" stroke="#61988F" stroke-width="1.35" opacity="0.23" />
    <ellipse cx="400" cy="300" rx="137.1" ry="65.4" transform="rotate(-317.6 400 300)" stroke="#4AA694" stroke-width="1.35" opacity="0.20" />
    <ellipse cx="400" cy="300" rx="141.7" ry="57.9" transform="rotate(-341.4 400 300)" stroke="#32B399" stroke-width="1.35" opacity="0.17" />
    <ellipse cx="400" cy="300" rx="146.0" ry="50.9" transform="rotate(-362.6 400 300)" stroke="#1BC19F" stroke-width="1.35" opacity="0.14" />
    <ellipse cx="400" cy="300" rx="149.7" ry="44.8" transform="rotate(-380.5 400 300)" stroke="#03CEA4" stroke-width="1.35" opacity="0.11" />
  </g>

  <rect x="0" y="0" width="760" height="500" fill="#000000" opacity="0.38" />
  <rect x="0" y="340" width="430" height="160" fill="#000000" opacity="0.32" />

  <g filter="url(#soft-copy-shadow)">
    <path d="M74 118H524" stroke="url(#copy-rule)" stroke-width="4" stroke-linecap="round" opacity="0.95" />
    <text x="70" y="202" fill="#F5F5F5" font-family="Arial, Helvetica, sans-serif" font-size="76" font-weight="800" letter-spacing="0">Level Up Your</text>
    <text x="70" y="296" fill="url(#agent-gradient)" font-family="Arial, Helvetica, sans-serif" font-size="92" font-weight="850" letter-spacing="0">Agent</text>
    <text x="74" y="334" fill="#F5F5F5" opacity="0.82" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="500" letter-spacing="0">Human and AI raters guide decisions</text>
  </g>
</svg>
