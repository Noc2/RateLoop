<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" role="img" aria-labelledby="title desc">
  <title id="title">RateLoop X profile banner</title>
  <desc id="desc">An abstract dark social banner with colorful rating signal loops and no RateLoop logo.</desc>
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#000000" />
      <stop offset="48%" stop-color="#070707" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
    <radialGradient id="blue-glow" cx="72%" cy="48%" r="44%">
      <stop offset="0%" stop-color="#359EEE" stop-opacity="0.22" />
      <stop offset="58%" stop-color="#359EEE" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#359EEE" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="pink-glow" cx="86%" cy="62%" r="40%">
      <stop offset="0%" stop-color="#EF476F" stop-opacity="0.18" />
      <stop offset="60%" stop-color="#EF476F" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#EF476F" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="yellow-glow" cx="60%" cy="32%" r="48%">
      <stop offset="0%" stop-color="#FFC43D" stop-opacity="0.13" />
      <stop offset="64%" stop-color="#FFC43D" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#FFC43D" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="spectrum-stroke" x1="750" y1="74" x2="1420" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#359EEE" />
      <stop offset="28%" stop-color="#03CEA4" />
      <stop offset="56%" stop-color="#FFC43D" />
      <stop offset="100%" stop-color="#EF476F" />
    </linearGradient>
    <linearGradient id="signal-line" x1="120" y1="0" x2="1340" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#359EEE" stop-opacity="0" />
      <stop offset="22%" stop-color="#359EEE" stop-opacity="0.42" />
      <stop offset="46%" stop-color="#03CEA4" stop-opacity="0.52" />
      <stop offset="70%" stop-color="#FFC43D" stop-opacity="0.48" />
      <stop offset="100%" stop-color="#EF476F" stop-opacity="0" />
    </linearGradient>
    <pattern id="dot-field" width="42" height="42" patternUnits="userSpaceOnUse">
      <circle cx="21" cy="21" r="1.1" fill="#F5F5F5" opacity="0.16" />
    </pattern>
    <filter id="soft-line-glow" x="-18%" y="-28%" width="136%" height="156%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="wide-glow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="15" />
    </filter>
  </defs>
  <rect width="1500" height="500" fill="url(#surface)" />
  <rect width="1500" height="500" fill="url(#blue-glow)" />
  <rect width="1500" height="500" fill="url(#pink-glow)" />
  <rect width="1500" height="500" fill="url(#yellow-glow)" />
  <rect width="1500" height="500" fill="url(#dot-field)" opacity="0.24" />

  <g opacity="0.24" stroke="#F5F5F5" stroke-width="1">
    <path d="M0 72H1500" />
    <path d="M0 430H1500" />
    <path d="M120 0V500" />
    <path d="M480 0V500" />
    <path d="M930 0V500" />
    <path d="M1320 0V500" />
  </g>

  <g fill="none" stroke-linecap="round" filter="url(#soft-line-glow)">
    <path d="M78 312C214 276 260 204 392 228C514 250 548 352 684 334C842 313 852 166 1010 162C1158 158 1234 280 1422 224" stroke="url(#signal-line)" stroke-width="2.2" opacity="0.68" />
    <path d="M80 372C230 342 330 300 448 316C566 332 616 404 748 382C874 361 908 260 1042 262C1172 264 1252 340 1424 312" stroke="url(#signal-line)" stroke-width="1.5" opacity="0.36" />
    <path d="M70 188C210 148 298 122 426 142C560 164 590 238 716 222C852 205 894 104 1038 100C1188 96 1268 164 1432 134" stroke="url(#signal-line)" stroke-width="1.6" opacity="0.42" />
  </g>

  <g transform="translate(1078 250)" fill="none" stroke-linecap="round" filter="url(#soft-line-glow)">
    <ellipse rx="314" ry="190" transform="rotate(-38)" stroke="#359EEE" stroke-width="2.6" opacity="0.78" />
    <ellipse rx="316" ry="188" transform="rotate(-28)" stroke="#03CEA4" stroke-width="1.8" opacity="0.62" />
    <ellipse rx="318" ry="186" transform="rotate(-18)" stroke="#FFC43D" stroke-width="1.8" opacity="0.62" />
    <ellipse rx="320" ry="184" transform="rotate(-8)" stroke="#EF476F" stroke-width="1.8" opacity="0.56" />
    <ellipse rx="322" ry="182" transform="rotate(2)" stroke="#359EEE" stroke-width="1.5" opacity="0.42" />
    <ellipse rx="324" ry="180" transform="rotate(12)" stroke="#03CEA4" stroke-width="1.5" opacity="0.42" />
    <ellipse rx="326" ry="178" transform="rotate(22)" stroke="#FFC43D" stroke-width="1.5" opacity="0.44" />
    <ellipse rx="328" ry="176" transform="rotate(32)" stroke="#EF476F" stroke-width="1.5" opacity="0.44" />
    <ellipse rx="330" ry="174" transform="rotate(42)" stroke="url(#spectrum-stroke)" stroke-width="1.4" opacity="0.50" />
    <ellipse rx="332" ry="172" transform="rotate(52)" stroke="url(#spectrum-stroke)" stroke-width="1.2" opacity="0.42" />
    <ellipse rx="334" ry="170" transform="rotate(62)" stroke="url(#spectrum-stroke)" stroke-width="1.1" opacity="0.34" />
  </g>

  <g transform="translate(1078 250)" fill="none" opacity="0.55">
    <circle r="222" stroke="#F5F5F5" stroke-width="1" opacity="0.18" />
    <circle r="105" stroke="#F5F5F5" stroke-width="1" opacity="0.12" />
    <circle r="286" stroke="url(#spectrum-stroke)" stroke-width="8" opacity="0.12" filter="url(#wide-glow)" />
  </g>

  <g opacity="0.72">
    <circle cx="282" cy="250" r="5" fill="#359EEE" />
    <circle cx="362" cy="250" r="4" fill="#03CEA4" />
    <circle cx="442" cy="250" r="4" fill="#FFC43D" />
    <circle cx="522" cy="250" r="4" fill="#EF476F" />
    <path d="M282 250H522" stroke="#F5F5F5" stroke-width="1.3" opacity="0.22" />
  </g>

  <rect x="0" y="0" width="1500" height="500" fill="#000000" opacity="0.10" />
  <rect x="0" y="340" width="420" height="160" fill="#000000" opacity="0.28" />
</svg>
