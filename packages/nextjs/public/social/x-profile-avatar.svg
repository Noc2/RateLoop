<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">RateLoop X profile avatar</title>
  <desc id="desc">A dark RateLoop profile avatar using the existing multicolor loop mark.</desc>
  <defs>
    <radialGradient id="avatar-surface" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#161616" />
      <stop offset="58%" stop-color="#050505" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
    <radialGradient id="center-vignette" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#050505" stop-opacity="0" />
      <stop offset="76%" stop-color="#000000" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.92" />
    </radialGradient>
    <pattern id="pin-grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <circle cx="32" cy="32" r="1.4" fill="#F5F5F5" opacity="0.12" />
    </pattern>
    <filter id="mark-glow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="logo-seg-0" x1="64" y1="21" x2="85.5" y2="26.761" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFC43D" />
      <stop offset="1" stop-color="#FFC43D" />
    </linearGradient>
    <linearGradient id="logo-seg-1" x1="85.5" y1="26.761" x2="101.239" y2="42.5" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFC43D" />
      <stop offset="1" stop-color="#FFC43D" />
    </linearGradient>
    <linearGradient id="logo-seg-2" x1="101.239" y1="42.5" x2="107" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFC43D" />
      <stop offset="1" stop-color="#FFC43D" />
    </linearGradient>
    <linearGradient id="logo-seg-3" x1="107" y1="64" x2="101.239" y2="85.5" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFC43D" />
      <stop offset="1" stop-color="#EF476F" />
    </linearGradient>
    <linearGradient id="logo-seg-4" x1="101.239" y1="85.5" x2="85.5" y2="101.239" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EF476F" />
      <stop offset="1" stop-color="#EF476F" />
    </linearGradient>
    <linearGradient id="logo-seg-5" x1="85.5" y1="101.239" x2="64" y2="107" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EF476F" />
      <stop offset="1" stop-color="#EF476F" />
    </linearGradient>
    <linearGradient id="logo-seg-6" x1="64" y1="107" x2="42.5" y2="101.239" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EF476F" />
      <stop offset="1" stop-color="#EF476F" />
    </linearGradient>
    <linearGradient id="logo-seg-7" x1="42.5" y1="101.239" x2="26.761" y2="85.5" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EF476F" />
      <stop offset="1" stop-color="#359EEE" />
    </linearGradient>
    <linearGradient id="logo-seg-8" x1="26.761" y1="85.5" x2="21" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#359EEE" />
      <stop offset="1" stop-color="#359EEE" />
    </linearGradient>
    <linearGradient id="logo-seg-9" x1="21" y1="64" x2="26.761" y2="42.5" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#359EEE" />
      <stop offset="1" stop-color="#359EEE" />
    </linearGradient>
    <linearGradient id="logo-seg-10" x1="26.761" y1="42.5" x2="42.5" y2="26.761" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#359EEE" />
      <stop offset="1" stop-color="#03CEA4" />
    </linearGradient>
    <linearGradient id="logo-seg-11" x1="42.5" y1="26.761" x2="64" y2="21" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#03CEA4" />
      <stop offset="1" stop-color="#FFC43D" />
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="#000000" />
  <circle cx="512" cy="512" r="512" fill="url(#avatar-surface)" />
  <rect width="1024" height="1024" fill="url(#pin-grid)" opacity="0.35" />
  <g transform="translate(104 104) scale(6.375)" fill="none" stroke-width="10" stroke-linecap="butt" stroke-linejoin="round" filter="url(#mark-glow)">
    <path d="M64 21 A43 43 0 0 1 85.5 26.761" stroke="url(#logo-seg-0)" />
    <path d="M85.5 26.761 A43 43 0 0 1 101.239 42.5" stroke="url(#logo-seg-1)" />
    <path d="M101.239 42.5 A43 43 0 0 1 107 64" stroke="url(#logo-seg-2)" />
    <path d="M107 64 A43 43 0 0 1 101.239 85.5" stroke="url(#logo-seg-3)" />
    <path d="M101.239 85.5 A43 43 0 0 1 85.5 101.239" stroke="url(#logo-seg-4)" />
    <path d="M85.5 101.239 A43 43 0 0 1 64 107" stroke="url(#logo-seg-5)" />
    <path d="M64 107 A43 43 0 0 1 42.5 101.239" stroke="url(#logo-seg-6)" />
    <path d="M42.5 101.239 A43 43 0 0 1 26.761 85.5" stroke="url(#logo-seg-7)" />
    <path d="M26.761 85.5 A43 43 0 0 1 21 64" stroke="url(#logo-seg-8)" />
    <path d="M21 64 A43 43 0 0 1 26.761 42.5" stroke="url(#logo-seg-9)" />
    <path d="M26.761 42.5 A43 43 0 0 1 42.5 26.761" stroke="url(#logo-seg-10)" />
    <path d="M42.5 26.761 A43 43 0 0 1 64 21" stroke="url(#logo-seg-11)" />
  </g>
  <circle cx="512" cy="512" r="512" fill="url(#center-vignette)" />
</svg>
