{
  // Gambit mutation run for the FrontendRegistry stake/slash proofs.
  // Measures whether FrontendRegistry.spec actually CATCHES injected bugs: Gambit
  // generates mutants of the contract, and certoraMutate verifies each against the
  // spec via the Prover. A SURVIVING mutant (all rules still pass on broken code)
  // means the spec under-constrains that line — a weak-spec signal, not a contract bug.
  //
  // Run from packages/foundry (needs CERTORAKEY — each mutant is a full prover job):
  //   certoraMutate certora/mutation/frontend-registry.mutation.conf
  //
  // Chosen as a first target because it is harness-based and via_ir-free (no internal-
  // summary tooling limits) and the proofs are fast, so a full mutant sweep is cheap.
  "prover_conf": "certora/confs/frontend-registry.conf",
  "mutations": {
    "gambit": [
      {
        "filename": "contracts/FrontendRegistry.sol"
      }
    ]
  },
  "msg": "FrontendRegistry spec-strength mutation run"
}
