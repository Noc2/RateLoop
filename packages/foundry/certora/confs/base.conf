{
  // Shared compiler + prover settings. Merge a target conf on top of this, e.g.:
  //   certoraRun certora/confs/base.conf certora/confs/math.conf
  // These mirror packages/foundry/foundry.toml [profile.default].
  "solc": "solc",
  "solc_via_ir": true,
  "solc_optimize": "100",
  "solc_evm_version": "cancun",
  "optimistic_loop": true,
  "rule_sanity": "basic"
}
