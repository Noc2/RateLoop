{
  // Shared compiler + prover settings. Target confs inherit these by pointing at
  // this file with "override_base_config" (the target's own keys win on conflict);
  // certoraRun only accepts a single conf file, so do not pass this one directly.
  // These mirror packages/foundry/foundry.toml [profile.default].
  "solc": "solc",
  "solc_via_ir": true,
  "solc_optimize": "100",
  "solc_evm_version": "cancun",
  // certora-cli 8.13.1 only maps Yul optimizer steps through solc 0.8.34; 0.8.35
  // (our production pin) falls through to "Yul Optimizer steps missing". 0.8.35 did
  // not change the Yul optimizer, so we pass 0.8.34's exact step string explicitly
  // (lifted from certora-cli's solc0_8_34_to_0_8_34 table) to verify the real
  // production solc + via_ir. Drop this once certora-cli maps 0.8.35 natively.
  "yul_optimizer_steps": "dfDvulfnTUtnIfxa[r]EscLMVcul[j]Trpeulxa[r]cLvifMCTUca[r]LSsTFOtfDnca[r]IulcscCTUtvifMx[scCTUt]TOntnfDIulvifMjmul[jul]VcTOculjmul",
  "optimistic_loop": true,
  // Treat any still-unresolved external call as side-effect-free (havoc nothing)
  // rather than havoc-all. Sound here because the contracts only call out to
  // distinct external contracts (registries, consumers, ERC20s) that cannot write
  // this contract's storage; without it, parametric rules see spurious havoc.
  "optimistic_fallback": true,
  "rule_sanity": "basic"
}
