{
  // Phase 1: pure math libraries. Inherits shared compiler/prover settings from
  // base.conf via override_base_config (this file's keys win on any conflict).
  // Run with: certoraRun certora/confs/math.conf
  "override_base_config": "certora/confs/base.conf",
  // Override base's via_ir: certora-cli (8.13.1) lacks the Yul optimizer step
  // sequence for solc 0.8.35 + via_ir ("Yul Optimizer steps missing for requested
  // Solidity version"). The pure integer math harness does not depend on IR
  // codegen and compiles on the legacy pipeline, so disabling via_ir here is safe.
  "solc_via_ir": false,
  "files": ["certora/harnesses/MathHarness.sol"],
  "verify": "MathHarness:certora/specs/Math.spec",
  "msg": "RateLoop Phase 1 math libraries"
}
