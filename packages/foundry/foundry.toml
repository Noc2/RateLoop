[profile.default]
src = "contracts"
out = "out"
libs = ["lib", "node_modules"]
evm_version = "prague"
solc = "0.8.35"
via_ir = true
optimizer = true
optimizer_runs = 100
build_info = true
extra_output = ["abi", "evm.bytecode", "evm.deployedBytecode"]
ignored_error_codes = [6335]

[profile.deploy]
optimizer_runs = 0
revert_strings = "strip"
bytecode_hash = "none"
cbor_metadata = false

[rpc_endpoints]
baseSepolia = "${BASE_SEPOLIA_RPC_URL}"
localhost = "http://127.0.0.1:8545"

[etherscan]
baseSepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }

[invariant]
runs = 256
depth = 50
fail_on_revert = false
dictionary_weight = 80

[fmt]
line_length = 120
tab_width = 4
quote_style = "double"
bracket_spacing = true
int_types = "long"

[lint]
lint_on_build = false
