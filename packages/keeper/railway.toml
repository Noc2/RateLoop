[build]
builder = "RAILPACK"
buildCommand = "yarn workspace @rateloop/keeper build:workspace-deps && yarn workspace @rateloop/keeper build"
watchPatterns = [
  ".yarn/**",
  ".yarnrc.yml",
  "package.json",
  "yarn.lock",
  "scripts/clean-package-dist.mjs",
  "scripts/fix-esm-extensions.mjs",
  "scripts/with-workspace-dist-lock.mjs",
  "scripts/write-cjs-package-json.mjs",
  "packages/contracts/**",
  "packages/keeper/**",
  "packages/node-utils/**",
]

[deploy]
startCommand = "NODE_ENV=production yarn workspace @rateloop/keeper start:built-dist"
healthcheckPath = "/live"
healthcheckTimeout = 120
