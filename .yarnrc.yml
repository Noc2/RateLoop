enableColors: true

logFilters:
  - level: discard
    pattern: "@solana/* doesn't provide fastestsmallesttextencoderdecoder*"
  - level: discard
    pattern: "@solana/rpc-subscriptions@npm:* doesn't provide ws*"
  - level: discard
    pattern: "@thirdweb-dev/engine@npm:* doesn't provide @hey-api/openapi-ts*"
  - level: discard
    pattern: "thirdweb@npm:* doesn't provide react-dom*"
  - level: discard
    pattern: "x402@npm:* doesn't provide @solana/sysvars*"
  - level: discard
    pattern: "x402@npm:* doesn't provide @tanstack/react-query*"
  - level: discard
    pattern: "x402@npm:* doesn't provide react*"
  - level: discard
    pattern: "x402@npm:* doesn't provide typescript*"
  - level: discard
    pattern: "Some peer dependencies are incorrectly met*"

nmHoistingLimits: workspaces

nodeLinker: node-modules

packageExtensions:
  "@solana/web3.js@*":
    dependencies:
      typescript: "~5.8.2"
  "@remotion/google-fonts@*":
    peerDependencies:
      react: ">=16.8.0"
      react-dom: ">=16.8.0"
  "@remotion/studio-server@*":
    peerDependencies:
      react: ">=16.8.0"
      react-dom: ">=16.8.0"
  "@remotion/studio-shared@*":
    peerDependencies:
      react: ">=16.8.0"
      react-dom: ">=16.8.0"
  "@remotion/zod-types@*":
    peerDependencies:
      react: ">=16.8.0"
      react-dom: ">=16.8.0"
  "react-hot-toast@*":
    dependencies:
      csstype: "^3.1.3"

plugins:
  - path: .yarn/plugins/@yarnpkg/plugin-typescript.cjs
    spec: "@yarnpkg/plugin-typescript"
  - path: .yarn/plugins/@yarnpkg/plugin-interactive-tools.cjs
    spec: "@yarnpkg/plugin-interactive-tools"
  - path: .yarn/plugins/@rateloop/plugin-dead-code.cjs
    spec: ".yarn/plugins/@rateloop/plugin-dead-code.cjs"
  - path: .yarn/plugins/@yarnpkg/plugin-workspace-tools.cjs
    spec: "@yarnpkg/plugin-workspace-tools"

yarnPath: .yarn/releases/yarn-3.2.3.cjs
