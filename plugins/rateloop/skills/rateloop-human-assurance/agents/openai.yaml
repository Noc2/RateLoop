interface:
  display_name: "RateLoop Human Assurance"
  short_description: "Human review for public or safely redacted AI workflows."
  default_prompt: "Use $rateloop-human-assurance to prepare privacy-bounded human review of this AI-enabled workflow."

dependencies:
  tools:
    - type: "mcp"
      value: "rateloop"
      description: "RateLoop tokenless MCP for capability discovery, approved browser handoffs, status, and results."
      transport: "streamable_http"
      url: "https://rateloop-tokenless.vercel.app/api/mcp"

policy:
  allow_implicit_invocation: true
